                                    <button onClick={(e) => { e.stopPropagation(); deleteCustomExercise(ex); }} style={{color:'var(--crimson-neon)',background:'none',border:'none',cursor:'pointer',fontSize:'14px',lineHeight:1}}>&times;</button>
                                </span>
                            ))}
                        </div>
                        {showCircuitBuilder && (
                            <div className="circuit-builder">
                                <h4 className="heading-sm mb-3" style={{color:'var(--cyan-neon)'}}>BUILD CIRCUIT</h4>
                                <div className="mb-3"><label className="label-cyber">CIRCUIT NAME</label><input type="text" placeholder="Circuit name" value={circuitName} onChange={(e) => setCircuitName(e.target.value)} className="input-cyber" /></div>
                                <div className="flex gap-3 mb-3">
                                    <div style={{flex:1}}><label className="label-cyber">ROUNDS</label><input type="number" min="1" value={circuitRounds} onChange={(e) => setCircuitRounds(Math.max(1, parseInt(e.target.value) || 1))} className="input-cyber" /></div>
                                    <div style={{flex:1}}><label className="label-cyber">REST BETWEEN</label><input type="text" placeholder="1:00" value={circuitRest} onChange={(e) => setCircuitRest(e.target.value)} className="input-cyber" /></div>
                                </div>
                                <div className="mb-3">
                                    <label className="label-cyber">ADD TO CIRCUIT</label>
                                    <select value={circuitExName} onChange={(e) => setCircuitExName(e.target.value)} className="select-cyber mb-2"><option value="">Select...</option>{exercisesList.map((ex, i) => (<option key={i} value={ex}>{ex}</option>))}</select>
                                    <input type="text" placeholder="Or custom" value={circuitExName && !exercisesList.includes(circuitExName) ? circuitExName : ''} onChange={(e) => setCircuitExName(e.target.value)} className="input-cyber mb-2" />
                                    <div className="flex gap-2 items-end">
                                        <div style={{flex:1}}><label className="label-cyber">REPS</label><input type="number" placeholder="10" value={circuitExReps} onChange={(e) => setCircuitExReps(parseInt(e.target.value) || 0)} className="input-cyber" /></div>
                                        <div style={{flex:1}}><label className="label-cyber">WT (LBS)</label><input type="number" placeholder="0" value={circuitExWeight} onChange={(e) => setCircuitExWeight(parseInt(e.target.value) || 0)} className="input-cyber" /></div>
                                        <button onClick={addCircuitExerciseToBuilder} className="btn-cyber-sm">+ ADD</button>
                                    </div>
                                </div>
                                {circuitExercises.length > 0 && (
                                    <div className="mb-3">
                                        <label className="label-cyber">EXERCISES:</label>
                                        {circuitExercises.map((ex, i) => (
                                            <div key={i} className="circuit-exercise-row">
                                                <span>{ex.name} — {ex.reps} reps @ {ex.weight} lbs</span>
                                                <button onClick={() => removeCircuitExerciseFromBuilder(i)} className="btn-cyber-danger">&times;</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <button onClick={addCircuit} disabled={circuitExercises.length === 0} className="btn-cyber-accent" style={{fontSize:'11px',padding:'6px 14px'}}>ADD TO WORKOUT</button>
                            </div>
                        )}
                    </div>
                    {workout.map((exercise, exerciseIndex) => (
                        exercise.type === 'circuit' ? (
                            <div key={exerciseIndex} className="cyber-panel-sm" style={{padding:'16px', marginBottom:'12px', borderColor:'rgba(0,245,255,0.15)'}}>
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="heading-md" style={{color:'var(--cyan-neon)'}}>⟳ {exercise.name} ({exercise.rounds} RDS, REST {exercise.restBetweenRounds})</h3>
                                    <button onClick={() => removeCircuit(exerciseIndex)} className="btn-cyber-danger">REMOVE</button>
                                </div>
                                {exercise.exercises.map((ex, i) => (
                                    <div key={i} className="circuit-exercise-row">
                                        <span style={{fontWeight:600,fontSize:'12px'}}>{ex.name}</span>
                                        <span className="text-muted" style={{fontSize:'12px'}}>{ex.reps} reps @ {ex.weight} lbs</span>
                                    </div>
                                ))}

                                <div className="cyber-panel" style={{padding:'16px', marginBottom:'12px'}}>
                                    <h3 className="heading-md mb-4">{currentExercise || 'SELECT EXERCISE'}</h3>
                                    <div className="flex gap-3 mb-4">
                                        <div style={{flex:1}}><label className="label-cyber">REPS</label><input type="number" placeholder="Reps" value={currentSet.reps} onChange={(e) => setCurrentSet({ ...currentSet, reps: e.target.value })} className="input-cyber" /></div>
                                        <div style={{flex:1}}><label className="label-cyber">WEIGHT</label><input type="number" placeholder="Weight" value={currentSet.weight} onChange={(e) => setCurrentSet({ ...currentSet, weight: e.target.value })} className="input-cyber" /></div>
                                        <div style={{flex:1}}><label className="label-cyber">EXERTION</label><input type="number" min="1" max="10" placeholder="1-10" value={currentSet.exertion} onChange={(e) => setCurrentSet({ ...currentSet, exertion: Math.min(10, Math.max(1, parseInt(e.target.value) || 0)) })} className="input-cyber" /></div>
                                    </div>
                                </div>
                                {isResting ? (
                                    <div className="text-center mb-4">
                                        <TimerRing seconds={timer} totalSeconds={60} isCountdown={false} isCrimson={true} label="REST" />
                                        <button onClick={restDone} className="btn-cyber-accent mt-4" style={{fontSize:'16px',padding:'14px 36px'}}>REST DONE</button>
                                    </div>
                                ) : (
                                    <button onClick={completeLiveSet} className="btn-cyber-accent mb-4" style={{fontSize:'14px',width:'100%'}}>COMPLETE SET</button>
                                )}
                                <textarea value={workoutNotes} onChange={(e) => setWorkoutNotes(e.target.value)} placeholder="ADD NOTES..." className="textarea-cyber mb-4" rows="3" />
                                <div className="mb-4">
                                    <h3 className="heading-md mb-3">CURRENT LOG</h3>
                                    {liveWorkout.map((exercise, index) => (
                                        <div key={index} className="cyber-panel-sm" style={{padding:'12px',marginBottom:'8px'}}>
                                            <h4 className="heading-sm mb-2">{exercise.exercise}</h4>
                                            <p className="text-muted">SETS: {exercise.totalSets} | REPS: {exercise.reps} | WT: {exercise.weight} | RPE: {exercise.exertion}</p>
                                            {exercise.rest && <p className="text-muted">REST: {exercise.rest}</p>}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={finishLiveWorkout} className="btn-cyber-accent">FINISH</button>
                                    <button onClick={() => setPage('home')} className="btn-cyber">BACK</button>
                                </div>
                            </div>
                        )}

                        {page === 'history' && (
                            <div className="animate-in">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px'}}>
                                    <h2 className="heading-lg" style={{marginBottom:0}}>HISTORY</h2>
                                    <button onClick={() => setHistoryOrder(prev => prev === 'newest' ? 'oldest' : 'newest')} className="btn-cyber-sm" title="Toggle order">⇅</button>
                                </div>
                                {sortedHistory.map((entry, index) => (
                                    <div key={index} className="cyber-panel-sm" style={{padding:'14px',marginBottom:'10px'}}>
                                        <h3 className="heading-sm mb-1">{new Date(entry.date).toLocaleString()}</h3>
                                        {entry.workout && (
                                            <div className="mb-2">
                                                {entry.completed === false ? (
                                                    <p style={{color:'var(--crimson-neon)',fontSize:'11px',fontFamily:'var(--font-mono)',fontWeight:600,textShadow:'0 0 4px var(--crimson-glow)',marginBottom:'6px'}}>⚠ WORKOUT INCOMPLETE — ENDED EARLY</p>
                                                ) : (
                                                    <p style={{color:'var(--cyan-neon)',fontSize:'11px',fontFamily:'var(--font-mono)',textShadow:'0 0 4px var(--cyan-glow)',marginBottom:'6px'}}>✓ COMPLETED</p>
                                                )}
                                            </div>
                                        )}
                                        {entry.workout ? entry.workout.map((exercise, ei) => (
                                            <div key={ei} className="mb-3">
                                                {exercise.sets ? (
                                                    <>
                                                        <h3 className="heading-sm">{exercise.name} ({exercise.sets.length} SETS)</h3>
                                                        {exercise.sets.map((set, si) => {
                                                            const restKey = `${ei}_${si}`;
                                                            const restData = entry.actualRestTimes && entry.actualRestTimes[restKey];
                                                            const origEx = entry.originalWorkout && entry.originalWorkout[ei];
                                                            const origSet = origEx && origEx.sets && origEx.sets[si];
                                                            const repsChanged = origSet && origSet.reps !== set.reps;
                                                            const wtChanged = origSet && origSet.weight !== set.weight;
                                                            const restChanged = origSet && origSet.rest !== set.rest;
                                                            const hasChange = repsChanged || wtChanged || restChanged;
                                                            return (
                                                                <div key={si} style={{marginLeft:'8px',marginTop:'4px',fontSize:'11px'}}>
                                                                    <span className="text-muted">
                                                                        SET {si+1}: {set.reps} reps @ {set.weight} lbs
                                                                        {set.duration ? ` [DUR: ${set.duration}]` : ''}
                                                                    </span>
                                                                    {restData ? (
                                                                        restData.skipped ? (
                                                                            <span style={{color:'var(--crimson-neon)',marginLeft:'6px',fontSize:'10px'}}>
                                                                                REST: {restData.actual} (SKIPPED, planned {restData.planned})
                                                                            </span>
                                                                        ) : (
                                                                            <span style={{color:'rgba(0,245,255,0.5)',marginLeft:'6px',fontSize:'10px'}}>
                                                                                REST: {restData.actual}
                                                                            </span>
                                                                        )
                                                                    ) : (
                                                                        <span style={{color:'rgba(200,214,229,0.3)',marginLeft:'6px',fontSize:'10px'}}>
                                                                            REST: {set.rest || '—'}
                                                                        </span>
                                                                    )}
                                                                    {hasChange && (
                                                                        <span style={{color:'#ffb832',marginLeft:'6px',fontSize:'10px',textShadow:'0 0 4px rgba(255,180,50,0.4)'}}>
                                                                            [EDITED: {origSet.reps}r/{origSet.weight}w/{origSet.rest}t → {set.reps}r/{set.weight}w/{set.rest}t]
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </>
                                                ) : (
                                                    <div>
                                                        <h3 className="heading-sm" style={{color:'var(--cyan-neon)'}}>⟳ {exercise.name} — {exercise.rounds} RDS</h3>
                                                        {exercise.completedRounds && exercise.completedRounds.map((round, ri) => (
                                                            <div key={ri} style={{marginLeft:'10px',borderLeft:'2px solid var(--silver-dim)',paddingLeft:'10px',marginTop:'4px'}}>
                                                                <p className="text-dim" style={{fontSize:'10px',fontWeight:600}}>ROUND {ri+1}</p>
                                                                {round.exercises && round.exercises.map((ex, ei) => (
                                                                    <p key={ei} className="text-muted" style={{fontSize:'11px'}}>{ex.name}: {ex.reps} × {ex.weight} lbs{ex.duration ? ` (DUR: ${ex.duration})` : ''}</p>
                                                                ))}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )) : entry.liveWorkout && entry.liveWorkout.map((ex, ei) => (
                                            <div key={ei} className="mb-3">
                                                <h3 className="heading-sm">{ex.exercise} ({ex.totalSets} SETS)</h3>
                                                <p className="text-muted" style={{fontSize:'11px'}}>REPS: {ex.reps} | WT: {ex.weight}</p>
                                                {ex.rest && <p className="text-muted" style={{fontSize:'11px'}}>REST: {ex.rest}</p>}
                                            </div>
                                        ))}
                                        {entry.notes && <p className="text-muted mt-2" style={{fontStyle:'italic'}}>NOTES: {entry.notes}</p>}
                                        {entry.volume && <p className="text-muted mt-1">VOL: {entry.volume.toLocaleString()} LBS</p>}
                                        <div className="flex gap-2 flex-wrap mt-3">
                                            {entry.workout && (
                                                <button onClick={() => { const cloned = JSON.parse(JSON.stringify(entry.workout)); setWorkout(cloned); startWorkout(); }} className="btn-cyber-accent" style={{fontSize:'11px',padding:'6px 14px'}}>LOAD & REPEAT</button>
                                            )}
                                            <button onClick={() => {
                                                const newHistory = history.filter((_, i) => i !== index);
                                                setHistory(newHistory);
                                                localStorage.setItem('history', JSON.stringify(newHistory));
                                            }} className="btn-cyber-danger" style={{fontSize:'11px',padding:'6px 14px'}}>DELETE</button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setPage('home')} className="btn-cyber mt-3">← BACK</button>
                            </div>
                        )}

                        {page === 'savedWorkouts' && (
                            <div className="animate-in">
                                <h2 className="heading-lg mb-4">SAVED WORKOUTS</h2>
                                {savedWorkouts.map((sw, i) => (
                                    <div key={i} className="cyber-panel-sm" style={{padding:'14px',marginBottom:'8px'}}>
                                        <h3 className="heading-md mb-3">{sw.name}</h3>
                                        <div className="flex gap-2 flex-wrap">
                                            <button onClick={() => loadWorkout(sw)} className="btn-cyber-accent" style={{fontSize:'11px',padding:'6px 14px'}}>LOAD</button>
                                            <button onClick={() => editSavedWorkout(i)} className="btn-cyber-sm">EDIT</button>
                                            <button onClick={() => deleteSavedWorkout(i)} className="btn-cyber-danger">DELETE</button>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={() => setPage('home')} className="btn-cyber mt-3">← BACK</button>
                            </div>
                        )}

                        {page === 'progress' && (
                            <div className="animate-in">
                                <h2 className="heading-lg mb-4">PROGRESS</h2>
                                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))',gap:'12px'}}>
                                    {Object.keys(progressData).map(exercise => (
                                        <div key={exercise} className="cyber-panel-sm" style={{padding:'14px'}}>
                                            <h3 className="heading-md mb-3">{exercise}</h3>
                                            <div className="chart-container">
                                                <canvas id={`chart-${exercise}`}></canvas>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setPage('home')} className="btn-cyber mt-4">← BACK</button>
                            </div>
                        )}

                        {page === 'statistics' && (
                            <div className="animate-in">
                                <h2 className="heading-lg mb-4">STATISTICS</h2>
                                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))',gap:'12px'}}>
                                    <div className="cyber-panel" style={{padding:'18px'}}>
                                        <h3 className="heading-md mb-4" style={{color:'var(--cyan-neon)'}}>OVERVIEW</h3>
                                        <div className="mb-4"><span className="stat-label-cyber">WORKOUTS</span><div className="stat-value-cyber">{statistics.totalWorkouts}</div></div>
                                        <div><span className="stat-label-cyber">TOTAL VOLUME</span><div className="stat-value-cyber" style={{fontSize:'1.3rem'}}>{statistics.totalVolume.toLocaleString()} <span style={{fontSize:'12px',fontWeight:400,color:'var(--silver-mid)'}}>LBS</span></div></div>
                                    </div>
                                    <div className="cyber-panel" style={{padding:'18px'}}>
                                        <h3 className="heading-md mb-4" style={{color:'var(--cyan-neon)'}}>PERSONAL BESTS</h3>
                                        {Object.entries(statistics.personalBests).map(([ex, wt]) => (
                                            <div key={ex} className="flex justify-between mb-2"><span className="text-muted">{ex}</span><span className="heading-sm">{wt} LBS</span></div>
                                        ))}
                                    </div>
                                    <div className="cyber-panel" style={{padding:'18px',gridColumn:'1/-1'}}>
                                        <h3 className="heading-md mb-4" style={{color:'var(--cyan-neon)'}}>MOST FREQUENT</h3>
                                        {Object.entries(statistics.frequentExercises).sort(([,a],[,b]) => b - a).slice(0,10).map(([ex, ct]) => (
                                            <div key={ex} className="flex justify-between mb-2"><span className="text-muted">{ex}</span><span className="heading-sm">{ct}×</span></div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => setPage('home')} className="btn-cyber mt-4">← BACK</button>
                            </div>
                        )}

                        {/* AI Chat Widget */}
                        <AIChatWidget 
                            exercisesList={exercisesList} setExercisesList={setExercisesList}
                            workout={workout} setWorkout={setWorkout}
                            workoutName={workoutName} setWorkoutName={setWorkoutName}
                            savedWorkouts={savedWorkouts} setSavedWorkouts={setSavedWorkouts}
                            setPage={setPage} resetCreateWorkoutPage={resetCreateWorkoutPage}
                            startWorkout={startWorkout} user={user}
                        />

                        {/* Status Bar */}
                        <div className="status-bar" style={{marginTop:'auto'}}>
                            <span>SYS_STAT // READY</span>
                            <span style={{color:'var(--cyan-neon)',textShadow:'0 0 4px var(--cyan-glow)'}}>UPLINK // SECURE</span>
                            <span>FITNESS_PACER v2.0</span>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
