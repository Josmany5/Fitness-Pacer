<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Pacer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* AI Chat Styles */
        .ai-toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        .ai-toggle-btn:hover {
            transform: scale(1.1);
        }
        .ai-toggle-btn.open {
            background: #ef4444;
            transform: rotate(90deg);
        }
        .ai-chat-panel {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 380px;
            max-height: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .ai-chat-panel.minimized {
            max-height: 50px;
            overflow: hidden;
        }
        .ai-chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .ai-chat-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }
        .ai-chat-header button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            opacity: 0.8;
        }
        .ai-chat-header button:hover {
            opacity: 1;
        }
        .ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            min-height: 200px;
            max-height: 400px;
            background: #f8f9fa;
        }
        .ai-message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        .ai-message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .ai-message.assistant {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .ai-message.assistant p { margin: 0 0 8px 0; }
        .ai-message.assistant p:last-child { margin-bottom: 0; }
        .ai-message.assistant ul, .ai-message.assistant ol { margin: 4px 0; padding-left: 20px; }
        .ai-message.assistant li { margin-bottom: 2px; }
        .ai-message.assistant strong { font-weight: 700; }
        .ai-chat-input-area {
            display: flex;
            padding: 8px;
            border-top: 1px solid #e0e0e0;
            background: white;
            flex-shrink: 0;
        }
        .ai-chat-input-area input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            margin-right: 8px;
        }
        .ai-chat-input-area input:focus {
            border-color: #667eea;
        }
        .ai-chat-input-area button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .ai-chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ai-loading {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 8px;
        }
        .ai-loading .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .ai-loading .dot:nth-child(1) { animation-delay: -0.32s; }
        .ai-loading .dot:nth-child(2) { animation-delay: -0.16s; }
        .ai-loading .dot:nth-child(3) { animation-delay: 0s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .ai-empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }
        .ai-empty-state .icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-roboto">
    <div id="root"></div>
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initialExercisesList = [
            "Squat", "Deadlift", "Pulldown", "Row", "Benchpress", "Shoulderpress", 
            "Bicep Curls", "Tricep Extensions", "Ham Curl", "Glute Thrust", 
            "Shrugs", "Chest Fly", "Delt Fly"
        ];

        // ===== AI SERVICE =====
        const AI_API_URL = '/api/ai';

        const askGemini = async (systemPrompt, conversationHistory, userMessage) => {
            const response = await fetch(AI_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'chat',
                    data: { systemPrompt, conversationHistory, message: userMessage }
                })
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'AI request failed');
            }
            const data = await response.json();
            return data.response;
        };

        // ===== JSON EXTRACTION =====
        const extractJSON = (text, prefix) => {
            let cleanText = text.replace(/```(?:json|tool_code)?\n?/g, '').replace(/```/g, '');
            const startIndex = cleanText.indexOf(prefix);
            if (startIndex === -1) return null;
            const jsonStart = cleanText.indexOf('{', startIndex);
            if (jsonStart === -1) return null;
            let braceCount = 0, inString = false, escaped = false;
            for (let i = jsonStart; i < cleanText.length; i++) {
                const char = cleanText[i];
                if (escaped) { escaped = false; continue; }
                if (char === '\\') { escaped = true; continue; }
                if (char === '"') { inString = !inString; continue; }
                if (!inString) {
                    if (char === '{') braceCount++;
                    if (char === '}') { braceCount--; if (braceCount === 0) return text.substring(jsonStart, i + 1); }
                }
            }
            return null;
        };

        const extractJSONArray = (text, prefix) => {
            let cleanText = text.replace(/```(?:json|tool_code)?\n?/g, '').replace(/```/g, '');
            const startIndex = cleanText.indexOf(prefix);
            if (startIndex === -1) return null;
            const jsonStart = cleanText.indexOf('[', startIndex);
            if (jsonStart === -1) return null;
            let bracketCount = 0, inString = false, escaped = false;
            for (let i = jsonStart; i < cleanText.length; i++) {
                const char = cleanText[i];
                if (escaped) { escaped = false; continue; }
                if (char === '\\') { escaped = true; continue; }
                if (char === '"') { inString = !inString; continue; }
                if (!inString) {
                    if (char === '[') bracketCount++;
                    if (char === ']') { bracketCount--; if (bracketCount === 0) return cleanText.substring(jsonStart, i + 1); }
                }
            }
            return null;
        };

        // Time utilities
        const formatTime = (timeInSeconds) => {
            const minutes = Math.floor(timeInSeconds / 60);
            const seconds = timeInSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        };

        const parseTime = (timeString) => {
            try {
                const [minutes, seconds] = timeString.split(':').map(Number);
                if (isNaN(minutes) || isNaN(seconds) || seconds >= 60) {
                    throw new Error('Invalid time format');
                }
                return minutes * 60 + seconds;
            } catch (error) {
                console.error('Error parsing time:', error);
                return 0;
            }
        };

            // Timer Hook
            const useTimer = (page, isResting, timer, setTimer) => {
                useEffect(() => {
                    let interval;
                    if (page === 'workout' && isResting && timer > 0) {
                        interval = setInterval(() => {
                            setTimer(prevTime => prevTime > 0 ? prevTime - 1 : 0);
                        }, 1000);
                    } else if (page === 'liveWorkout' && isResting) {
                        interval = setInterval(() => {
                            setTimer(prevTime => prevTime + 1);
                        }, 1000);
                    }
                    return () => clearInterval(interval);
                }, [page, isResting, timer]);
            };
            
            // Set stopwatch hook (counts up during set)
            const useSetStopwatch = (page, isDoingSet, setStopwatch, setSetStopwatch) => {
                useEffect(() => {
                    let interval;
                    if (page === 'workout' && isDoingSet) {
                        interval = setInterval(() => {
                            setSetStopwatch(prev => prev + 1);
                        }, 1000);
                    }
                    return () => {
                        if (interval) clearInterval(interval);
                    };
                }, [page, isDoingSet]);
            };

        // MultiSetAdder Component
        const MultiSetAdder = ({ exerciseIndex, addSet }) => {
            const [numberOfSets, setNumberOfSets] = useState(1);

            return (
                <div className="mb-4">
                    <input 
                        type="number" 
                        value={numberOfSets} 
                        onChange={(e) => setNumberOfSets(Math.max(1, parseInt(e.target.value)))}
                        className="border p-2 rounded w-1/4 mr-2"
                        min="1"
                    />
                    <button 
                        onClick={() => addSet(exerciseIndex, numberOfSets)}
                        className="bg-blue-500 text-white px-4 py-2 rounded mr-2"
                    >
                        Add Sets
                    </button>
                </div>
            );
        };

        // ===== AI CHAT COMPONENT =====
        const AIChatWidget = ({ exercisesList, setExercisesList, workout, setWorkout, workoutName, setWorkoutName, savedWorkouts, setSavedWorkouts, setPage, resetCreateWorkoutPage, startWorkout, user }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [isMinimized, setIsMinimized] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => {
                if (isOpen && !isMinimized) {
                    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                    setTimeout(() => inputRef.current?.focus(), 300);
                }
            }, [messages, isOpen, isMinimized]);

            // Build system prompt for fitness AI
            const buildSystemPrompt = () => {
                const exList = exercisesList.map(e => `- ${e}`).join('\n');
                return `You are a workout programming AI in the Fitness Pacer app. You know all strength, running/cardio, sport, yoga, flexibility/mobility, calisthenics, and hypertrophy training methodologies.

## ABOUT THE USER

You work with a single experienced athlete:
- 5'10", 175 lbs, aiming to lose 10 pounds while building strength and size
- Rock climber (boulders V1-V6+, routes 5.10-5.13), kung fu practitioner (mantis, crane, lohan, weapon styles), boxer, parkour, calisthenics, weightlifter, and runner
- Trains with weights, bodyweight, climbing drills, martial arts forms, running/cardio, boxing, parkour, and flexibility
- Create custom exercises for any activity — climbing problems, kung fu drills, running splits, etc.

## HOW YOU WORK

Lead the conversation step by step. Your first reply is always a question — ask what kind of training they want today. Let them tell you.

When they respond, ask follow-up questions: what body parts or exercises they have in mind, how many sets and reps, what weight. If they are unsure or ask you to decide, suggest a reasonable structure based on their goals.

Present your suggested workout in plain text only. Describe the exercises, sets, reps, and weights conversationally. Ask if it looks good or if they want to adjust anything.

Wait for explicit confirmation — words like "yes", "good", "looks good", "do it", "save it", "create it", "start it" — before outputting any JSON markers.

The output markers run invisible. Never show JSON, code, or raw data in your chat messages. Only write natural conversational text.

## WHAT YOU CAN DO

Create AND automatically save a workout with one marker. Place it on its own line after your text:
- WORKOUT_JSON: array of exercises with name, sets (reps, weight, rest) — creates the workout AND saves it to the Saved Workouts page. Optionally include a "workoutName" field at the top to name the workout (e.g., "Push Day A"). If you omit the name, the workout saves as "AI Workout".

Current exercises:
${exList}`;
            };

            const handleSend = async () => {
                const text = input.trim();
                if (!text || isLoading) return;

                const userMsg = { role: 'user', content: text, timestamp: Date.now() };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsLoading(true);

                try {
                    const trimmedHistory = messages.slice(-10);
                    
                    // Build prompt with current state info
                    const sysPrompt = buildSystemPrompt() + `\nCurrent workout state: ${JSON.stringify(workout)}\nSaved workouts: ${savedWorkouts.map(w => w.name).join(', ') || 'none'}`;
                    
                    const response = await askGemini(sysPrompt, trimmedHistory, text);

                    // Parse JSON commands from response
                    // WORKOUT_JSON can be an array [...] or an object {exercises: [...]}
                    let workoutJSON = extractJSONArray(response, 'WORKOUT_JSON:');
                    if (!workoutJSON) workoutJSON = extractJSON(response, 'WORKOUT_JSON:');
                    
                    // Fallback: try to find any JSON array in the response that looks like workout data
                    if (!workoutJSON) {
                        const arrayMatch = response.match(/\[\s*\{\s*"name"\s*:/);
                        if (arrayMatch) {
                            const fromIdx = arrayMatch.index;
                            let bracketCount = 0, inStr = false, esc = false;
                            for (let i = fromIdx; i < response.length; i++) {
                                const c = response[i];
                                if (esc) { esc = false; continue; }
                                if (c === '\\') { esc = true; continue; }
                                if (c === '"') { inStr = !inStr; continue; }
                                if (!inStr) {
                                    if (c === '[') bracketCount++;
                                    if (c === ']') { bracketCount--; if (bracketCount === 0) { workoutJSON = response.substring(fromIdx, i + 1); break; } }
                                }
                            }
                        }
                    }
                    // Fallback: try to find any JSON object with exercises array
                    if (!workoutJSON) {
                        const exercisesMatch = response.match(/\{\s*"exercises"\s*:/);
                        if (exercisesMatch) {
                            let braceCount = 0, inStr = false, esc = false;
                            for (let i = exercisesMatch.index; i < response.length; i++) {
                                const c = response[i];
                                if (esc) { esc = false; continue; }
                                if (c === '\\') { esc = true; continue; }
                                if (c === '"') { inStr = !inStr; continue; }
                                if (!inStr) {
                                    if (c === '{') braceCount++;
                                    if (c === '}') { braceCount--; if (braceCount === 0) { workoutJSON = response.substring(exercisesMatch.index, i + 1); break; } }
                                }
                            }
                        }
                    }
                    
                    // Handle WORKOUT_JSON — creates AND auto-saves
                    if (workoutJSON) {
                        try {
                            const raw = JSON.parse(workoutJSON);
                            let parsedExercises = [];
                            if (Array.isArray(raw)) {
                                parsedExercises = raw;
                            } else if (raw.exercises && Array.isArray(raw.exercises)) {
                                parsedExercises = raw.exercises;
                            } else if (raw.name) {
                                parsedExercises = [raw];
                            }
                            
                            const finalWorkoutData = parsedExercises.map(ex => {
                                if (ex.sets && Array.isArray(ex.sets) && ex.sets.length > 0 && typeof ex.sets[0] === 'object') {
                                    return ex;
                                }
                                const numSets = parseInt(ex.sets) || 3;
                                const weightNum = parseInt(String(ex.weight || '0').replace(/[^0-9]/g, '')) || 0;
                                const flatSets = Array.from({ length: numSets }, () => ({
                                    reps: parseInt(ex.reps) || 10,
                                    weight: weightNum,
                                    rest: ex.rest || '1:30'
                                }));
                                return { name: ex.name, sets: flatSets };
                            });
                            
                            if (finalWorkoutData.length > 0) {
                                const workoutName = raw.workoutName || raw.name || null;
                                const saveName = workoutName || 'AI Workout';
                                
                                setWorkout(finalWorkoutData);
                                setWorkoutName(saveName);
                                
                                // Auto-add new exercises to list
                                finalWorkoutData.forEach(ex => {
                                    if (!exercisesList.includes(ex.name)) {
                                        setExercisesList(prev => prev.includes(ex.name) ? prev : [...prev, ex.name]);
                                    }
                                });
                                
                                // Auto-save to saved workouts
                                const newSaved = [...savedWorkouts, { name: saveName, workout: [...finalWorkoutData] }];
                                setSavedWorkouts(newSaved);
                                localStorage.setItem('savedWorkouts', JSON.stringify(newSaved));
                            }
                        } catch (e) {
                            console.error('Failed to parse WORKOUT_JSON:', e);
                        }
                    }

                    // Clean display message - remove ALL JSON content
                    let displayMessage = response;
                    // Remove entire lines that contain JSON markers
                    displayMessage = displayMessage.split('\n').filter(line => {
                        const t = line.trim();
                        if (t.startsWith('WORKOUT_JSON:')) return false;
                        if (t.startsWith('SAVE_WORKOUT_JSON:')) return false;
                        if (t.startsWith('START_WORKOUT_JSON:')) return false;
                        if (t.startsWith('ADD_EXERCISE_JSON:')) return false;
                        if (t.startsWith('{') && t.endsWith('}') && t.length > 5) return false;
                        if (t.startsWith('[') && t.endsWith(']') && t.length > 5) return false;
                        if (t.startsWith('```')) return false;
                        return true;
                    }).join('\n').trim();

                    if (displayMessage) {
                        const assistantMsg = { role: 'assistant', content: displayMessage, timestamp: Date.now() };
                        setMessages(prev => [...prev, assistantMsg]);
                    }
                } catch (error) {
                    console.error('AI Error:', error);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `⚠️ Error: ${error.message || 'Failed to connect to AI. Make sure the server is running.'}`, 
                        timestamp: Date.now() 
                    }]);
                }
                setIsLoading(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <>
                    {/* Floating AI Button */}
                    <button 
                        className={`ai-toggle-btn ${isOpen ? 'open' : ''}`}
                        onClick={() => { setIsOpen(!isOpen); if (!isOpen) setIsMinimized(false); }}
                        title="AI Assistant"
                    >
                        {isOpen ? '✕' : '🤖'}
                    </button>

                    {/* Chat Panel */}
                    {isOpen && (
                        <div className={`ai-chat-panel ${isMinimized ? 'minimized' : ''}`}>
                            <div className="ai-chat-header" onClick={() => setIsMinimized(!isMinimized)}>
                                <h3>🤖 Fitness AI Coach</h3>
                                <div>
                                    <button onClick={(e) => { e.stopPropagation(); setIsMinimized(!isMinimized); }}>
                                        {isMinimized ? '□' : '━'}
                                    </button>
                                </div>
                            </div>

                            {!isMinimized && (
                                <>
                                    <div className="ai-chat-messages">
                                        {messages.length === 0 && !isLoading && (
                                            <div className="ai-empty-state">
                                                <div className="icon">💪</div>
                                                <p>Ask me to create a workout, add exercises, save routines, or start a saved workout!</p>
                                                <p className="text-xs mt-2 text-gray-400">Example: "Create a push day with Bench Press 4x8 at 185"</p>
                                            </div>
                                        )}
                                        {messages.map((msg, i) => (
                                            <div key={i} className={`ai-message ${msg.role}`}>
                                                {msg.content.split('\n').map((line, j) => (
                                                    <p key={j}>{line}</p>
                                                ))}
                                            </div>
                                        ))}
                                        {isLoading && (
                                            <div className="ai-message assistant ai-loading">
                                                <div className="dot"></div>
                                                <div className="dot"></div>
                                                <div className="dot"></div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>

                                    <div className="ai-chat-input-area">
                                        <input 
                                            ref={inputRef}
                                            type="text" 
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            onKeyDown={handleKeyDown}
                                            placeholder="Ask about workouts..."
                                            disabled={isLoading}
                                        />
                                        <button onClick={handleSend} disabled={isLoading || !input.trim()}>
                                            ➤
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </>
            );
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [workout, setWorkout] = useState([]);
            const [currentExercise, setCurrentExercise] = useState('');
            const [currentSet, setCurrentSet] = useState({ reps: 0, weight: 0, exertion: 0 });
            const [history, setHistory] = useState([]);
            const [liveWorkout, setLiveWorkout] = useState([]);
            const [timer, setTimer] = useState(0);
            const [isResting, setIsResting] = useState(false);
            const [isDoingSet, setIsDoingSet] = useState(false);
            const [setStopwatch, setSetStopwatch] = useState(0);
            const [savedWorkouts, setSavedWorkouts] = useState([]);
            const [workoutName, setWorkoutName] = useState('');
            const [exercisesList, setExercisesList] = useState(initialExercisesList);
            const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
            const [currentSetIndex, setCurrentSetIndex] = useState(0);
            const [user, setUser] = useState(null);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [progressData, setProgressData] = useState({});
            const [workoutNotes, setWorkoutNotes] = useState('');
            const [statistics, setStatistics] = useState({
                totalWorkouts: 0,
                totalVolume: 0,
                personalBests: {},
                frequentExercises: {}
            });

            // Use the custom timer hooks
            useTimer(page, isResting, timer, setTimer);
            useSetStopwatch(page, isDoingSet, setStopwatch, setSetStopwatch);

            useEffect(() => {
                try {
                    const storedHistory = localStorage.getItem('history');
                    if (storedHistory) {
                        setHistory(JSON.parse(storedHistory));
                    }
                    
                    const storedWorkouts = localStorage.getItem('savedWorkouts');
                    if (storedWorkouts) {
                        setSavedWorkouts(JSON.parse(storedWorkouts));
                    }
                } catch (error) {
                    console.error('Error loading data:', error);
                    localStorage.clear();
                }
            }, []);

            useEffect(() => {
                if (user) {
                    localStorage.setItem(`history_${user.username}`, JSON.stringify(history));
                }
            }, [history, user]);

            useEffect(() => {
                if (user) {
                    localStorage.setItem(`savedWorkouts_${user.username}`, JSON.stringify(savedWorkouts));
                }
            }, [savedWorkouts, user]);

            // Save exercises list to localStorage
            useEffect(() => {
                localStorage.setItem('exercisesList', JSON.stringify(exercisesList));
            }, [exercisesList]);

            // Load exercises list from localStorage
            useEffect(() => {
                try {
                    const stored = localStorage.getItem('exercisesList');
                    if (stored) {
                        setExercisesList(JSON.parse(stored));
                    }
                } catch {}
            }, []);

            const handleLogin = () => {
                const newUser = { username, password };
                setUser(newUser);
                localStorage.setItem('user', JSON.stringify(newUser));
                
                const storedSavedWorkouts = localStorage.getItem(`savedWorkouts_${username}`);
                if (storedSavedWorkouts) {
                    setSavedWorkouts(JSON.parse(storedSavedWorkouts));
                }
                
                const storedHistory = localStorage.getItem(`history_${username}`);
                if (storedHistory) {
                    setHistory(JSON.parse(storedHistory));
                }
                
                setUsername('');
                setPassword('');
            };

            const handleSignup = () => {
                const newUser = { username, password };
                setUser(newUser);
                localStorage.setItem('user', JSON.stringify(newUser));
                setUsername('');
                setPassword('');
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('user');
            };

            const resetCreateWorkoutPage = () => {
                setWorkout([]);
                setCurrentExercise('');
                setWorkoutName('');
            };

            const addExercise = () => {
                if (currentExercise) {
                    setWorkout([...workout, { name: currentExercise, sets: [] }]);
                    setCurrentExercise('');
                }
            };

            const addCustomExercise = () => {
                if (currentExercise && !exercisesList.includes(currentExercise)) {
                    setExercisesList([...exercisesList, currentExercise]);
                    addExercise();
                }
            };

            const addSet = (exerciseIndex, numberOfSets = 1) => {
                const newWorkout = workout.map((exercise, index) => {
                    if (index === exerciseIndex) {
                        const newSets = [...exercise.sets];
                        for (let i = 0; i < numberOfSets; i++) {
                            newSets.push({ reps: 0, weight: 0, rest: 0 });
                        }
                        return { ...exercise, sets: newSets };
                    }
                    return exercise;
                });
                setWorkout(newWorkout);
            };

            const removeSet = (exerciseIndex, setIndex) => {
                const newWorkout = workout.map((exercise, index) => {
                    if (index === exerciseIndex) {
                        const newSets = exercise.sets.filter((_, i) => i !== setIndex);
                        return { ...exercise, sets: newSets };
                    }
                    return exercise;
                });
                setWorkout(newWorkout);
            };

            const handleSetChange = (exerciseIndex, setIndex, field, value) => {
                const newWorkout = workout.map((exercise, index) => {
                    if (index === exerciseIndex) {
                        const newSets = exercise.sets.map((set, i) => 
                            i === setIndex ? { ...set, [field]: value } : set
                        );
                        return { ...exercise, sets: newSets };
                    }
                    return exercise;
                });
                setWorkout(newWorkout);
            };

            const removeExercise = (indexToRemove) => {
                setWorkout(workout.filter((_, index) => index !== indexToRemove));
            };

            const startWorkout = () => {
                setCurrentExerciseIndex(0);
                setCurrentSetIndex(0);
                setPage('workout');
            };

            const completeSet = () => {
                const currentExercise = workout[currentExerciseIndex];
                const currentSet = currentExercise.sets[currentSetIndex];
                const restTimeInSeconds = parseTime(currentSet.rest);
                setTimer(restTimeInSeconds);
                setIsResting(true);
            };

            const nextSet = () => {
                setIsResting(false);
                setTimer(0);
                if (currentSetIndex < workout[currentExerciseIndex].sets.length - 1) {
                    setCurrentSetIndex(currentSetIndex + 1);
                } else {
                    if (currentExerciseIndex < workout.length - 1) {
                        setCurrentExerciseIndex(currentExerciseIndex + 1);
                        setCurrentSetIndex(0);
                    } else {
                        finishWorkout();
                    }
                }
            };

            const finishWorkout = () => {
                const newHistory = [...history, { 
                    workout, 
                    date: new Date(),
                    notes: workoutNotes,
                    volume: calculateTotalVolume({ workout })
                }];
                setHistory(newHistory);
                localStorage.setItem('history', JSON.stringify(newHistory));
                setWorkoutNotes('');
                setPage('home');
                resetCreateWorkoutPage();
                setCurrentExerciseIndex(0);
                setCurrentSetIndex(0);
                updateStatistics();
            };

            const startLiveWorkout = () => {
                setPage('liveWorkout');
            };

            const completeLiveSet = () => {
                if (!currentExercise || !currentSet.reps || !currentSet.weight) {
                    alert('Please fill in exercise, reps, and weight');
                    return;
                }

                console.log('Completing set:', { currentExercise, currentSet });
                
                setIsResting(true);
                setTimer(0);
                const existingExerciseIndex = liveWorkout.findIndex(set => set.exercise === currentExercise);
                
                if (existingExerciseIndex !== -1) {
                    const updatedLiveWorkout = [...liveWorkout];
                    updatedLiveWorkout[existingExerciseIndex] = {
                        ...updatedLiveWorkout[existingExerciseIndex],
                        reps: updatedLiveWorkout[existingExerciseIndex].reps + ',' + currentSet.reps,
                        weight: updatedLiveWorkout[existingExerciseIndex].weight + ',' + currentSet.weight,
                        exertion: updatedLiveWorkout[existingExerciseIndex].exertion + ',' + currentSet.exertion,
                        totalSets: updatedLiveWorkout[existingExerciseIndex].totalSets + 1
                    };
                    console.log('Updating existing exercise:', updatedLiveWorkout[existingExerciseIndex]);
                    setLiveWorkout(updatedLiveWorkout);
                } else {
                    const newExercise = { 
                        ...currentSet, 
                        exercise: currentExercise, 
                        totalSets: 1,
                        reps: currentSet.reps.toString(),
                        weight: currentSet.weight.toString(),
                        exertion: currentSet.exertion.toString()
                    };
                    console.log('Adding new exercise:', newExercise);
                    setLiveWorkout([...liveWorkout, newExercise]);
                }
            };

            const restDone = () => {
                setIsResting(false);
                const updatedLiveWorkout = [...liveWorkout];
                const lastExerciseIndex = updatedLiveWorkout.length - 1;
                updatedLiveWorkout[lastExerciseIndex] = {
                    ...updatedLiveWorkout[lastExerciseIndex],
                    rest: updatedLiveWorkout[lastExerciseIndex].rest 
                        ? updatedLiveWorkout[lastExerciseIndex].rest + ',' + formatTime(timer)
                        : formatTime(timer)
                };
                setLiveWorkout(updatedLiveWorkout);
                setTimer(0);
            };

            const finishLiveWorkout = () => {
                if (liveWorkout.length === 0) {
                    alert('No exercises recorded');
                    return;
                }

                const workoutEntry = {
                    liveWorkout: [...liveWorkout],
                    date: new Date(),
                    notes: workoutNotes,
                    volume: calculateTotalVolume({ liveWorkout })
                };

                const newHistory = [...history, workoutEntry];
                setHistory(newHistory);
                localStorage.setItem('history', JSON.stringify(newHistory));

                setLiveWorkout([]);
                setWorkoutNotes('');
                setCurrentSet({ reps: 0, weight: 0, exertion: 0 });
                setCurrentExercise('');
                setTimer(0);
                setIsResting(false);

                setPage('home');
            };

            const saveWorkout = () => {
                const newSavedWorkouts = [...savedWorkouts, { name: workoutName, workout }];
                setSavedWorkouts(newSavedWorkouts);
                localStorage.setItem('savedWorkouts', JSON.stringify(newSavedWorkouts));
                setWorkoutName('');
                resetCreateWorkoutPage();
            };

            const loadWorkout = (savedWorkout) => {
                setWorkout(savedWorkout.workout);
                startWorkout();
            };

            const editSavedWorkout = (index) => {
                const workoutToEdit = savedWorkouts[index];
                setWorkout(workoutToEdit.workout);
                setWorkoutName(workoutToEdit.name);
                setPage('editWorkout');
            };

            const updateWorkout = () => {
                const updatedSavedWorkouts = savedWorkouts.map(savedWorkout =>
                    savedWorkout.name === workoutName ? { name: workoutName, workout } : savedWorkout
                );
                setSavedWorkouts(updatedSavedWorkouts);
                localStorage.setItem('savedWorkouts', JSON.stringify(updatedSavedWorkouts));
                setPage('savedWorkouts');
            };

            const deleteSavedWorkout = (index) => {
                const newSavedWorkouts = savedWorkouts.filter((_, i) => i !== index);
                setSavedWorkouts(newSavedWorkouts);
                localStorage.setItem('savedWorkouts', JSON.stringify(newSavedWorkouts));
            };

            const generateProgressData = () => {
                const data = {};
                history.forEach(entry => {
                    if (!entry.date) return;
                    
                    const date = new Date(entry.date).toLocaleDateString();
                    
                    if (entry.workout) {
                        entry.workout.forEach(exercise => {
                            if (!data[exercise.name]) {
                                data[exercise.name] = {
                                    dates: [],
                                    weights: []
                                };
                            }
                            const maxWeight = Math.max(...exercise.sets.map(set => 
                                parseInt(set.weight) || 0
                            ));
                            if (maxWeight > 0) {
                                data[exercise.name].dates.push(date);
                                data[exercise.name].weights.push(maxWeight);
                            }
                        });
                    } else if (entry.liveWorkout) {
                        entry.liveWorkout.forEach(set => {
                            if (!data[set.exercise]) {
                                data[set.exercise] = {
                                    dates: [],
                                    weights: []
                                };
                            }
                            const weights = set.weight.split(',').map(w => parseInt(w) || 0);
                            const maxWeight = Math.max(...weights);
                            if (maxWeight > 0) {
                                data[set.exercise].dates.push(date);
                                data[set.exercise].weights.push(maxWeight);
                            }
                        });
                    }
                });
                setProgressData(data);
            };

            useEffect(() => {
                generateProgressData();
            }, [history]);

            useEffect(() => {
                if (page === 'progress') {
                    Object.keys(progressData).forEach(exercise => {
                        const canvas = document.getElementById(`chart-${exercise}`);
                        const existingChart = Chart.getChart(canvas);
                        if (existingChart) {
                            existingChart.destroy();
                        }
                    });

                    Object.entries(progressData).forEach(([exercise, data]) => {
                        const ctx = document.getElementById(`chart-${exercise}`);
                        if (!ctx) return;

                        new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: data.dates,
                                datasets: [{
                                    label: 'Max Weight (lbs)',
                                    data: data.weights,
                                    borderColor: 'rgb(75, 192, 192)',
                                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                                    tension: 0.1,
                                    fill: true
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        display: true,
                                        position: 'top'
                                    }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        title: {
                                            display: true,
                                            text: 'Weight (lbs)'
                                        }
                                    },
                                    x: {
                                        title: {
                                            display: true,
                                            text: 'Date'
                                        }
                                    }
                                }
                            }
                        });
                    });
                }
            }, [page, progressData]);

            const calculateTotalVolume = (workoutData) => {
                let volume = 0;
                if (workoutData.workout) {
                    workoutData.workout.forEach(exercise => {
                        exercise.sets.forEach(set => {
                            volume += (parseInt(set.reps) || 0) * (parseInt(set.weight) || 0);
                        });
                    });
                } else if (workoutData.liveWorkout) {
                    workoutData.liveWorkout.forEach(exercise => {
                        const reps = exercise.reps.split(',').map(r => parseInt(r) || 0);
                        const weights = exercise.weight.split(',').map(w => parseInt(w) || 0);
                        reps.forEach((rep, i) => {
                            volume += rep * (weights[i] || 0);
                        });
                    });
                }
                return volume;
            };

            const calculatePersonalBests = () => {
                const pbs = {};
                history.forEach(entry => {
                    if (entry.workout) {
                        entry.workout.forEach(exercise => {
                            const maxWeight = Math.max(...exercise.sets.map(set => parseInt(set.weight) || 0));
                            if (!pbs[exercise.name] || maxWeight > pbs[exercise.name]) {
                                pbs[exercise.name] = maxWeight;
                            }
                        });
                    } else if (entry.liveWorkout) {
                        entry.liveWorkout.forEach(exercise => {
                            const weights = exercise.weight.split(',').map(w => parseInt(w) || 0);
                            const maxWeight = Math.max(...weights);
                            if (!pbs[exercise.exercise] || maxWeight > pbs[exercise.exercise]) {
                                pbs[exercise.exercise] = maxWeight;
                            }
                        });
                    }
                });
                return pbs;
            };

            const getMostFrequentExercises = () => {
                const frequency = {};
                history.forEach(entry => {
                    if (entry.workout) {
                        entry.workout.forEach(exercise => {
                            frequency[exercise.name] = (frequency[exercise.name] || 0) + 1;
                        });
                    } else if (entry.liveWorkout) {
                        entry.liveWorkout.forEach(exercise => {
                            frequency[exercise.exercise] = (frequency[exercise.exercise] || 0) + 1;
                        });
                    }
                });
                return frequency;
            };

            const updateStatistics = () => {
                const stats = {
                    totalWorkouts: history.length,
                    totalVolume: history.reduce((total, entry) => total + (entry.volume || calculateTotalVolume(entry)), 0),
                    personalBests: calculatePersonalBests(),
                    frequentExercises: getMostFrequentExercises()
                };
                setStatistics(stats);
            };

            // Auto-advance when rest timer naturally ends (timer hits 0 during rest)
            useEffect(() => {
                if (page === 'workout' && isResting && timer === 0 && workout.length > 0) {
                    // Advance to next set
                    if (currentSetIndex < workout[currentExerciseIndex].sets.length - 1) {
                        setCurrentSetIndex(currentSetIndex + 1);
                    } else if (currentExerciseIndex < workout.length - 1) {
                        setCurrentExerciseIndex(currentExerciseIndex + 1);
                        setCurrentSetIndex(0);
                    } else {
                        finishWorkout();
                        return;
                    }
                    // Auto-start the set timer
                    setTimeout(() => {
                        setIsDoingSet(true);
                        setSetStopwatch(0);
                    }, 100);
                }
            }, [page, isResting, timer]);

            const renderWorkoutForm = (onSubmit, submitButtonText) => (
                <div>
                    <h2 className="text-2xl font-bold mb-4">{submitButtonText === "Save Workout" ? "Create" : "Edit"} Your Workout</h2>
                    <div className="mb-4">
                        <label className="block mb-2">Select Exercise</label>
                        <select value={currentExercise} onChange={(e) => setCurrentExercise(e.target.value)} className="border p-2 rounded w-full">
                            <option value="">-- Select Exercise --</option>
                            {exercisesList.map((exercise, index) => (
                                <option key={index} value={exercise}>{exercise}</option>
                            ))}
                        </select>
                        <input type="text" placeholder="Or enter custom exercise" className="border p-2 rounded w-full mt-2" value={currentExercise} onChange={(e) => setCurrentExercise(e.target.value)} />
                        <div className="flex space-x-2 mt-2">
                            <button onClick={addExercise} className="bg-blue-500 text-white px-4 py-2 rounded">Add Exercise</button>
                            <button onClick={addCustomExercise} className="bg-green-500 text-white px-4 py-2 rounded">Add Custom Exercise</button>
                        </div>
                    </div>
                    {workout.map((exercise, exerciseIndex) => (
                        <div key={exerciseIndex} className="mb-4">
                            <h3 className="font-bold">{exercise.name}</h3>
                            <MultiSetAdder exerciseIndex={exerciseIndex} addSet={addSet} />
                            {exercise.sets.map((set, setIndex) => (
                                <div key={setIndex} className="mb-4">
                                    <h4 className="font-bold">Set {setIndex + 1}</h4>
                                    <div className="flex space-x-2">
                                        <div className="w-1/4">
                                            <label className="block mb-1">Reps</label>
                                            <input type="number" placeholder="Reps" value={set.reps} onChange={(e) => handleSetChange(exerciseIndex, setIndex, 'reps', e.target.value)} className="border p-2 rounded w-full" />
                                        </div>
                                        <div className="w-1/4">
                                            <label className="block mb-1">Weight</label>
                                            <input type="number" placeholder="Weight" value={set.weight} onChange={(e) => handleSetChange(exerciseIndex, setIndex, 'weight', e.target.value)} className="border p-2 rounded w-full" />
                                        </div>
                                        <div className="w-1/4">
                                            <label className="block mb-1">Rest Time (mm:ss)</label>
                                            <input 
                                                type="text" 
                                                placeholder="0:00" 
                                                value={set.rest} 
                                                onChange={(e) => {
                                                    let value = e.target.value.replace(/[^0-9]/g, '');
                                                    
                                                    if (value) {
                                                        if (value.length <= 2) {
                                                            value = `0:${value.padStart(2, '0')}`;
                                                        } else {
                                                            const mins = parseInt(value.slice(0, -2));
                                                            const secs = value.slice(-2);
                                                            value = `${mins}:${secs}`;
                                                        }
                                                    }
                                                    
                                                    handleSetChange(exerciseIndex, setIndex, 'rest', value);
                                                }} 
                                                className="border p-2 rounded w-full" 
                                            />
                                        </div>
                                    </div>
                                    {setIndex === 0 && (
                                        <button 
                                            onClick={() => {
                                                const newWorkout = [...workout];
                                                newWorkout[exerciseIndex].sets = newWorkout[exerciseIndex].sets.map(s => ({...set}));
                                                setWorkout(newWorkout);
                                            }}
                                            className="bg-green-500 text-white px-2 py-1 rounded mt-2 mr-2"
                                        >
                                            Apply to All
                                        </button>
                                    )}
                                    <button onClick={() => removeSet(exerciseIndex, setIndex)} className="bg-red-500 text-white px-2 py-1 rounded mt-2">Remove Set</button>
                                </div>
                            ))}
                            <button onClick={() => removeExercise(exerciseIndex)} className="bg-red-500 text-white px-4 py-2 rounded">Remove Exercise</button>
                        </div>
                    ))}
                    <div className="mb-4">
                        <input type="text" placeholder="Workout Name" className="border p-2 rounded w-full mt-2" value={workoutName} onChange={(e) => setWorkoutName(e.target.value)} />
                        <button onClick={onSubmit} className="bg-yellow-500 text-white px-4 py-2 rounded mt-2">{submitButtonText}</button>
                    </div>
                    <div className="mb-4">
                        <button onClick={startWorkout} className="bg-green-500 text-white px-4 py-2 rounded">Start Workout</button>
                    </div>
                    <button onClick={() => setPage('home')} className="bg-gray-500 text-white px-4 py-2 rounded">Back to Menu</button>
                </div>
            );

            return (
                <div className="container mx-auto p-4">
                    {page === 'home' && (
                        <div className="text-center p-4">
                            <h1 className="text-4xl font-bold mb-8">Fitness Pacer</h1>
                            <div className="flex flex-col space-y-4 max-w-xs mx-auto px-4">
                                <button 
                                    onClick={() => { setPage('createWorkout'); resetCreateWorkoutPage(); }} 
                                    className="bg-blue-500 text-white px-4 py-3 rounded-lg text-lg"
                                >
                                    Create Your Workout
                                </button>
                                <button 
                                    onClick={() => setPage('liveWorkout')} 
                                    className="bg-green-500 text-white px-4 py-3 rounded-lg text-lg"
                                >
                                    Live Workout
                                </button>
                                <button 
                                    onClick={() => setPage('savedWorkouts')} 
                                    className="bg-yellow-500 text-white px-4 py-3 rounded-lg text-lg"
                                >
                                    Saved Workouts
                                </button>
                                <button 
                                    onClick={() => setPage('history')} 
                                    className="bg-gray-500 text-white px-4 py-3 rounded-lg text-lg"
                                >
                                    View History
                                </button>
                                <button 
                                    onClick={() => setPage('progress')} 
                                    className="bg-purple-500 text-white px-4 py-3 rounded-lg text-lg"
                                >
                                    View Progress
                                </button>
                                <button 
                                    onClick={() => setPage('statistics')} 
                                    className="bg-indigo-500 text-white px-4 py-3 rounded-lg text-lg"
                                >
                                    View Statistics
                                </button>
                            </div>
                        </div>
                    )}

                    {page === 'createWorkout' && renderWorkoutForm(saveWorkout, "Save Workout")}

                    {page === 'editWorkout' && renderWorkoutForm(updateWorkout, "Update Workout")}

                    {page === 'workout' && (
                        <div className="text-center">
                            <h2 className="text-2xl font-bold mb-4">Workout</h2>
                            {workout.length > 0 && (
                                <div className="mb-8">
                                    <h3 className="text-4xl font-bold mb-4">{workout[currentExerciseIndex].name}</h3>
                                    <h4 className="text-2xl font-bold mb-2">Set {currentSetIndex + 1} of {workout[currentExerciseIndex].sets.length}</h4>
                                    <p className="text-3xl mb-2">Reps: {workout[currentExerciseIndex].sets[currentSetIndex].reps}</p>
                                    <p className="text-3xl mb-2">Weight: {workout[currentExerciseIndex].sets[currentSetIndex].weight}</p>
                                    <p className="text-3xl mb-2">Rest: {workout[currentExerciseIndex].sets[currentSetIndex].rest}</p>
                                    {isDoingSet ? (
                                        <div className="mb-4">
                                            <h3 className="text-5xl font-bold text-blue-600">Set Time: {formatTime(setStopwatch)}</h3>
                                            <button 
                                                onClick={() => {
                                                    // Record set duration, then start rest timer
                                                    const setDuration = setStopwatch;
                                                    setIsDoingSet(false);
                                                    setSetStopwatch(0);
                                                    // Store duration in the set data
                                                    const newWorkout = [...workout];
                                                    const currentSet = { ...newWorkout[currentExerciseIndex].sets[currentSetIndex], duration: formatTime(setDuration) };
                                                    newWorkout[currentExerciseIndex].sets[currentSetIndex] = currentSet;
                                                    setWorkout(newWorkout);
                                                    // Start rest timer
                                                    const restTimeInSeconds = parseTime(currentSet.rest);
                                                    setTimer(restTimeInSeconds);
                                                    setIsResting(true);
                                                }}
                                                className="bg-green-500 text-white px-6 py-3 rounded text-xl mt-4"
                                            >
                                                Complete Set ⏱ {formatTime(setStopwatch)}
                                            </button>
                                        </div>
                                    ) : isResting ? (
                                        <div className="mb-4">
                                            <h3 className="text-5xl font-bold text-orange-500">Rest: {formatTime(timer)}</h3>
                                            <p className="text-lg mt-2 text-gray-500">Last set took {workout[currentExerciseIndex].sets[currentSetIndex].duration || '—'}</p>
                                            {(currentSetIndex + 1 < workout[currentExerciseIndex].sets.length) ? (
                                                <div className="mt-4 p-4 bg-gray-100 rounded">
                                                    <h4 className="text-xl font-bold">Next Set:</h4>
                                                    <p>Reps: {workout[currentExerciseIndex].sets[currentSetIndex + 1].reps}</p>
                                                    <p>Weight: {workout[currentExerciseIndex].sets[currentSetIndex + 1].weight}</p>
                                                </div>
                                            ) : (currentExerciseIndex + 1 < workout.length) ? (
                                                <div className="mt-4 p-4 bg-gray-100 rounded">
                                                    <h4 className="text-xl font-bold">Next Exercise:</h4>
                                                    <p>{workout[currentExerciseIndex + 1].name}</p>
                                                    <p>Reps: {workout[currentExerciseIndex + 1].sets[0].reps}</p>
                                                    <p>Weight: {workout[currentExerciseIndex + 1].sets[0].weight}</p>
                                                </div>
                                            ) : null}
                                            <button 
                                                onClick={() => {
                                                    setIsResting(false);
                                                    setTimer(0);
                                                    // Advance to next set but DO NOT auto-start
                                                    if (currentSetIndex < workout[currentExerciseIndex].sets.length - 1) {
                                                        setCurrentSetIndex(currentSetIndex + 1);
                                                    } else if (currentExerciseIndex < workout.length - 1) {
                                                        setCurrentExerciseIndex(currentExerciseIndex + 1);
                                                        setCurrentSetIndex(0);
                                                    } else {
                                                        finishWorkout();
                                                    }
                                                }}
                                                className="bg-green-500 text-white px-8 py-4 rounded text-xl font-bold"
                                            >
                                                Next Set →
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="mb-4">
                                            <p className="text-lg text-gray-500 mb-4">Ready to begin this set?</p>
                                            <button 
                                                onClick={() => {
                                                    setIsDoingSet(true);
                                                    setSetStopwatch(0);
                                                }}
                                                className="bg-blue-500 text-white px-8 py-4 rounded text-xl font-bold"
                                            >
                                                Start Set
                                            </button>
                                            <p className="text-xs text-gray-400 mt-2">Timer counts up during your set</p>
                                        </div>
                                    )}
                                </div>
                            )}
                            <button onClick={finishWorkout} className="bg-red-500 text-white px-6 py-3 rounded text-xl">Finish Workout</button>
                            <div className="mt-4">
                                <textarea
                                    value={workoutNotes}
                                    onChange={(e) => setWorkoutNotes(e.target.value)}
                                    placeholder="Add workout notes..."
                                    className="w-full p-2 border rounded"
                                    rows="4"
                                />
                            </div>
                        </div>
                    )}

                    {page === 'liveWorkout' && (
                        <div>
                            <h2 className="text-2xl font-bold mb-4">Live Workout</h2>
                            <div className="mb-4">
                                <label className="block mb-2">Select Exercise</label>
                                <select value={currentExercise} onChange={(e) => setCurrentExercise(e.target.value)} className="border p-2 rounded w-full">
                                    <option value="">-- Select Exercise --</option>
                                    {exercisesList.map((exercise, index) => (
                                        <option key={index} value={exercise}>{exercise}</option>
                                    ))}
                                </select>
                                <input type="text" placeholder="Or enter custom exercise" className="border p-2 rounded w-full mt-2" value={currentExercise} onChange={(e) => setCurrentExercise(e.target.value)} />
                            </div>
                            <div className="mb-4">
                                <h3 className="font-bold">{currentExercise}</h3>
                                <div className="grid grid-cols-3 gap-4">
                                    <div>
                                        <label className="block mb-1">Reps</label>
                                        <input type="number" placeholder="Reps" value={currentSet.reps} onChange={(e) => setCurrentSet({ ...currentSet, reps: e.target.value })} className="border p-2 rounded w-full" />
                                    </div>
                                    <div>
                                        <label className="block mb-1">Weight</label>
                                        <input type="number" placeholder="Weight" value={currentSet.weight} onChange={(e) => setCurrentSet({ ...currentSet, weight: e.target.value })} className="border p-2 rounded w-full" />
                                    </div>
                                    <div>
                                        <label className="block mb-1">Exertion (1-10)</label>
                                        <input type="number" min="1" max="10" placeholder="Exertion" value={currentSet.exertion} onChange={(e) => setCurrentSet({ ...currentSet, exertion: Math.min(10, Math.max(1, parseInt(e.target.value) || 0)) })} className="border p-2 rounded w-full" />
                                    </div>
                                </div>
                            </div>
                            {isResting ? (
                                <div className="text-center mb-4">
                                    <h3 className="text-4xl font-bold">Rest Timer: {formatTime(timer)}</h3>
                                    <button onClick={restDone} className="bg-green-500 text-white px-4 py-2 rounded mt-2">Rest Done</button>
                                </div>
                            ) : (
                                <button onClick={completeLiveSet} className="bg-blue-500 text-white px-4 py-2 rounded">Complete Set</button>
                            )}
                            <div className="mt-4">
                                <textarea
                                    value={workoutNotes}
                                    onChange={(e) => setWorkoutNotes(e.target.value)}
                                    placeholder="Add workout notes..."
                                    className="w-full p-2 border rounded"
                                    rows="4"
                                />
                            </div>
                            <div className="mt-4">
                                <h3 className="text-xl font-bold mb-2">Current Workout Log</h3>
                                {liveWorkout.map((exercise, index) => (
                                    <div key={index} className="mb-4 p-4 bg-white rounded shadow">
                                        <h4 className="font-bold">{exercise.exercise}</h4>
                                        <p>Sets: {exercise.totalSets}</p>
                                        <p>Reps: {exercise.reps}</p>
                                        <p>Weight: {exercise.weight}</p>
                                        <p>Exertion: {exercise.exertion}</p>
                                        {exercise.rest && <p>Rest Times: {exercise.rest}</p>}
                                    </div>
                                ))}
                            </div>
                            <div className="mt-4 flex space-x-2">
                                <button onClick={finishLiveWorkout} className="bg-green-500 text-white px-4 py-2 rounded">Finish Workout</button>
                                <button onClick={() => setPage('home')} className="bg-gray-500 text-white px-4 py-2 rounded">Back to Menu</button>
                            </div>
                        </div>
                    )}

                    {page === 'history' && (
                        <div>
                            <h2 className="text-2xl font-bold mb-4">Workout History</h2>
                            {history.map((entry, index) => (
                                <div key={index} className="mb-4 border p-4 rounded">
                                    <h3 className="font-bold">Workout on {new Date(entry.date).toLocaleString()}</h3>
                                    {entry.workout ? (
                                        entry.workout.map((exercise, exerciseIndex) => (
                                            <div key={exerciseIndex} className="mb-4">
                                                <h3 className="font-bold">{exercise.name} - Total Sets: {exercise.sets.length}</h3>
                                                <p>Reps: {exercise.sets.map(set => set.reps).join(', ')}</p>
                                                <p>Weight: {exercise.sets.map(set => set.weight).join(', ')}</p>
                                                <p>Rest: {exercise.sets.map(set => set.rest).join(', ')}</p>
                                                {exercise.sets[0].duration && <p>Duration per set: {exercise.sets.map(set => set.duration || '-').join(', ')}</p>}
                                            </div>
                                        ))
                                    ) : entry.liveWorkout && (
                                        entry.liveWorkout.map((exercise, exerciseIndex) => (
                                            <div key={exerciseIndex} className="mb-4">
                                                <h3 className="font-bold">{exercise.exercise} - Total Sets: {exercise.totalSets}</h3>
                                                <p>Reps: {exercise.reps}</p>
                                                <p>Weight: {exercise.weight}</p>
                                                <p>Rest: {exercise.rest || 'N/A'}</p>
                                            </div>
                                        ))
                                    )}
                                    {entry.notes && <p className="mt-2 italic">Notes: {entry.notes}</p>}
                                    {entry.volume && <p className="mt-2">Total Volume: {entry.volume.toLocaleString()} lbs</p>}
                                    <button onClick={() => setHistory(history.filter((_, i) => i !== index))} className="bg-red-500 text-white px-4 py-2 rounded mt-2">Delete</button>
                                </div>
                            ))}
                            <button onClick={() => setPage('home')} className="bg-gray-500 text-white px-4 py-2 rounded">Back to Menu</button>
                        </div>
                    )}

                    {page === 'savedWorkouts' && (
                        <div>
                            <h2 className="text-2xl font-bold mb-4">Saved Workouts</h2>
                            {savedWorkouts.map((savedWorkout, index) => (
                                <div key={index} className="mb-4 border p-4 rounded">
                                    <h3 className="font-bold">{savedWorkout.name}</h3>
                                    <div className="flex space-x-2 mt-2">
                                        <button onClick={() => loadWorkout(savedWorkout)} className="bg-blue-500 text-white px-4 py-2 rounded">Load Workout</button>
                                        <button onClick={() => editSavedWorkout(index)} className="bg-yellow-500 text-white px-4 py-2 rounded">Edit</button>
                                        <button onClick={() => deleteSavedWorkout(index)} className="bg-red-500 text-white px-4 py-2 rounded">Delete</button>
                                    </div>
                                </div>
                            ))}
                            <button onClick={() => setPage('home')} className="bg-gray-500 text-white px-4 py-2 rounded">Back to Menu</button>
                        </div>
                    )}

                    {page === 'progress' && (
                        <div>
                            <h2 className="text-2xl font-bold mb-4">Workout Progress</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {Object.keys(progressData).map(exercise => (
                                    <div key={exercise} className="mb-8 p-4 bg-white rounded shadow">
                                        <h3 className="text-xl font-bold mb-2">{exercise}</h3>
                                        <div style={{height: "300px", position: "relative"}}>
                                            <canvas id={`chart-${exercise}`}></canvas>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setPage('home')} className="bg-gray-500 text-white px-4 py-2 rounded mt-4">
                                Back to Menu
                            </button>
                        </div>
                    )}

                    {page === 'statistics' && (
                        <div className="p-4">
                            <h2 className="text-2xl font-bold mb-4">Workout Statistics</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded shadow">
                                    <h3 className="text-xl font-bold mb-2">Overview</h3>
                                    <p>Total Workouts: {statistics.totalWorkouts}</p>
                                    <p>Total Volume: {statistics.totalVolume.toLocaleString()} lbs</p>
                                </div>
                                <div className="bg-white p-4 rounded shadow">
                                    <h3 className="text-xl font-bold mb-2">Personal Bests</h3>
                                    {Object.entries(statistics.personalBests).map(([exercise, weight]) => (
                                        <p key={exercise}>{exercise}: {weight} lbs</p>
                                    ))}
                                </div>
                                <div className="bg-white p-4 rounded shadow">
                                    <h3 className="text-xl font-bold mb-2">Most Frequent Exercises</h3>
                                    {Object.entries(statistics.frequentExercises)
                                        .sort(([,a], [,b]) => b - a)
                                        .map(([exercise, count]) => (
                                            <p key={exercise}>{exercise}: {count} times</p>
                                        ))}
                                </div>
                            </div>
                            <button onClick={() => setPage('home')} className="bg-gray-500 text-white px-4 py-2 rounded mt-4">
                                Back to Menu
                            </button>
                        </div>
                    )}

                    {/* AI Chat Widget */}
                    <AIChatWidget 
                        exercisesList={exercisesList}
                        setExercisesList={setExercisesList}
                        workout={workout}
                        setWorkout={setWorkout}
                        workoutName={workoutName}
                        setWorkoutName={setWorkoutName}
                        savedWorkouts={savedWorkouts}
                        setSavedWorkouts={setSavedWorkouts}
                        setPage={setPage}
                        resetCreateWorkoutPage={resetCreateWorkoutPage}
                        startWorkout={startWorkout}
                        user={user}
                    />
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
